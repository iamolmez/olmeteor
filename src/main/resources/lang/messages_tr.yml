messages:
  # ── Komut mesajları ──
  command:
    help:
      title: "&6&l=== OlMeteor Yardım ==="
      usage: |
        &e/olmeteor help &7- Bu yardım mesajını göster
        &e/olmeteor setup <tip> &7- Görsel kurulum moduna gir
        &e/olmeteor schematic <isim> &7- Setup seçimini şematik olarak kaydet
        &e/olmeteor start <tip> [dünya] [yarıçap] &7- Meteor etkinliği başlat
        &e/olmeteor spawnat <tip> <xyz> [dünya] &7- Koordinatlarda başlat
        &e/olmeteor stop <id> &7- Etkinliği durdur ve geri al
        &e/olmeteor cancel <id> &7- Etkinliği iptal et
        &e/olmeteor reload &7- Yapılandırmayı yenile
        &e/olmeteor wand &7- Kurulum asasını al
        &e/olmeteor list &7- Aktif etkinlikleri listele
        &e/olmeteor info <id> [hedef] &7- Etkinlik detaylarını göster
    reload:
      success: "&aYapılandırma başarıyla yenilendi."
    wand:
      success: "&aKurulum asası envanterinize eklendi."
    player_only: "&cBu komut yalnızca bir oyuncu tarafından kullanılabilir."
    no_permission: "&cBu komutu kullanma yetkiniz yok."

    setup:
      usage: "&eKullanım: /olmeteor setup <tip>"
      available_types: "&7Kullanılabilir tipler: %types%"
      invalid_type: "&cGeçersiz meteor tipi: &e%type%"

    start:
      usage: "&eKullanım: /olmeteor start <tip> [dünya]"
      invalid_type: "&cGeçersiz meteor tipi: &e%type%"
      scheduled: "&aMeteor etkinliği &e%eventId% &aşu konumda planlandı: &e%location%"
      error: "&cEtkinlik başlatılırken bir hata oluştu: %error%"
      location_fail: "&cMeteor etkinliği için uygun bir konum bulunamadı. Farklı bir dünya veya tip deneyin."
      world_not_found: "&c'%world%' dünyası bulunamadı."

    stop:
      usage: "&eKullanım: /olmeteor stop <eventId>"
      no_event: "&c%eventId% ID'li aktif etkinlik bulunamadı."
      success: "&a&e%eventId% &aetkinliği durduruluyor. Geri alma işlemi başladı."

    cancel:
      usage: "&eKullanım: /olmeteor cancel <eventId>"
      no_event: "&c%eventId% ID'li aktif etkinlik bulunamadı."
      success: "&c&e%eventId% &cetkinliği iptal edildi."

    list:
      title: "&6&l=== Aktif Meteor Etkinlikleri ==="
      empty: "&eHiçbir aktif meteor etkinliği bulunmuyor."
      entry: "&7- &f%eventId% &7| Tip: &f%type% &7| Dünya: &f%world% &7| %location%"

    info:
      title: "&6&l=== Meteor Etkinlik Bilgisi ==="
      no_event: "&c%eventId% ID'li aktif etkinlik bulunamadı."
      id: "&7ID: &f%eventId%"
      type: "&7Tip: &f%type%"
      phase: "&7Safha: &f%phase%"
      world: "&7Dünya: &f%world%"
      location: "&7Konum: &f%location%"
      radius: "&7Yarıçap: &f%radius% blok"
      schematic: "&7Şematik: &f%schematic%"
      distance: "&7&e%player%&7 mesafesi: &f%distance% blok"

    spawnat:
      usage: "&eKullanım: /olmeteor spawnat <tip> <x> <y> <z> [dünya]"

  # ── Görüntü varlık mesajları (hologramlar, yüzen metin) ──
  display:
    vault_hologram: "&6&l✦ Kasa &7| &eAnahtar: &f%count%"

  # ── Özel eşya isimleri ve açıklamaları ──
  item:
    meteor_key:
      name: "&6&l✦ Meteor Anahtarı"
      lore: |
        &7Göktaşı parçalarından dövülmüş bir anahtar.
        &7Meteor Kasasını açmak için kullanılır.
        
        &6✦ Meteor Tipi: &e%meteor_type%
        &7✦ &8Tek kullanımlık
        &7✦ &8Kişisel ganimet
        
        &e&lMeteor Kasasına sağ tıklayarak açın!
    setup_wand:
      name: "&6&l✦ Kurulum Asası"
      lore: |
        &6&l=== Bölge Seçim Aracı ===
        &eSol Tık &7- 1. konumu işaretle
        &eSağ Tık &7- 2. konumu işaretle
        
        &7Meteorun çarpacağı
        &7bölgeyi seçin.
    mob_spawn_tool:
      name: "&6&l✦ Doğma Noktası İşaretleyici"
      lore: |
        &6&l=== Mob Doğma Noktası Aracı ===
        &eSağ Tık &7- Doğma noktası belirle
        
        &7MythicMobs veya normal
        &7mobların doğacağı yerleri işaretleyin.
    loot_editor_item:
      name: "&6&l✦ Ganimet Düzenleyici"
      lore: |
        &6&l=== Ganimet Düzenleyici ===
        &eYere koy &7- Ganimet GUI'sini aç
        
        &7Meteor etkinliği ödülleri için
        &7ganimet tablosunu yapılandırın.
        
        &8GUI'deki eşyalara tıklayarak
        &8düşme şansı ve miktar ayarlayın.
    safe_exit:
      name: "&a&l✦ Güvenli Çıkış"
      lore: |
        &6&l=== Güvenli Çıkış ===
        &eSağ Tık &7- Kaydet ve kurulumdan çık
        
        &7Envanteriniz geri yüklenecek
        &7ve tüm kurulum verileri kaydedilecek.
        
        &a&l✔ Güvenle çıkmak için tıklayın!
    meteor_core:
      name: "&6&l★ Meteor Çekirdeği"
      lore: "&7Düşen bir yıldızın yanan kalbi."
    wind_charge:
      name: "&b&l✦ Kasırga Fırlatıcı"
      lore: |
        &7Yoğunlaştırılmış bir rüzgar patlaması,
        &7düşmanları gökyüzüne fırlatabilir.
    mace:
      name: "&6&l✦ Meteorit Topuz"
      lore: |
        &7Düşen bir meteorun çekirdeğinden dövüldü,
        &7bu topuz göksel enerjiyle çatırdıyor.
        
        &6Yoğunluk %density_level%
        &6Yarılma %breach_level%
        &6Rüzgar Patlaması %wind_burst_level%

