name: Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  administration: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: OlMeteor-Plugin
          path: build/libs/OlMeteor-*.jar
          retention-days: 30

  deploy-wiki:
    name: Deploy Wiki (GitHub Pages)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare Pages output
        run: |
          mkdir -p _site/wiki/en

          # Kopyala: wiki dosyalari
          cp -r wiki/*.md _site/wiki/
          cp -r wiki/en/*.md _site/wiki/en/
          cp -r wiki/en/_Sidebar.md _site/wiki/en/

          # Landing sayfasi ve .nojekyll
          cp docs/index.html _site/
          cp docs/.nojekyll _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
