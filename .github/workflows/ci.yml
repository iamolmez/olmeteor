name: Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: OlMeteor-Plugin
          path: build/libs/OlMeteor-*.jar
          retention-days: 30

  sync-wiki:
    name: Sync to GitHub Wiki
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout Wiki Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-tmp
          token: ${{ secrets.PAT_PAGES }}

      - name: Sync files to Wiki
        if: secrets.PAT_PAGES != ''
        run: |
          cd wiki-tmp

          # Mevcut wiki dosyalarını temizle (Home.md ve _Sidebar.md hariç)
          find . -maxdepth 1 -name "*.md" ! -name "Home.md" ! -name "_Sidebar.md" -delete
          rm -rf en

          # Türkçe wiki dosyalarını kopyala
          cp ../main-repo/wiki/*.md ./
          # İngilizce wiki dosyalarını kopyala
          mkdir -p en
          cp ../main-repo/wiki/en/*.md en/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to GitHub Wiki"
          else
            git commit -m "🔄 Automated wiki sync from main repository"
            git push
          fi
