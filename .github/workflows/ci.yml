name: Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: OlMeteor-Plugin
          path: build/libs/OlMeteor-*.jar
          retention-days: 30

  sync-wiki:
    name: Sync to GitHub Wiki
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync to GitHub Wiki
        env:
          WIKI_TOKEN: ${{ secrets.PAT_PAGES }}
        if: env.WIKI_TOKEN != ''
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone https://${{ github.actor }}:${{ secrets.PAT_PAGES }}@github.com/${{ github.repository }}.wiki.git .wiki-tmp

          # Mevcut wiki dosyalarını temizle (Home.md ve _Sidebar.md hariç)
          find .wiki-tmp -maxdepth 1 -name "*.md" ! -name "Home.md" ! -name "_Sidebar.md" -delete
          rm -rf .wiki-tmp/en

          # Türkçe wiki dosyalarını kopyala
          cp wiki/*.md .wiki-tmp/
          # İngilizce wiki dosyalarını kopyala
          mkdir -p .wiki-tmp/en
          cp wiki/en/*.md .wiki-tmp/en/

          cd .wiki-tmp
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to GitHub Wiki"
          else
            git commit -m "🔄 Automated wiki sync from main repository"
            git push
          fi
